   <g id="text_1">
    <text style="font: 700 8px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="74.8512" y="42.25485" transform="rotate(-0 74.8512 42.25485)">Use scenario</text>
   </g>
   <g id="text_2">
    <text style="font: 700 8px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="203.4144" y="42.25485" transform="rotate(-0 203.4144 42.25485)">Current evidence</text>
   </g>
   <g id="text_3">
    <text style="font: 700 8px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="307.872" y="42.14985" transform="rotate(-0 307.872 42.14985)">Boundary for interpretation</text>
   </g>
   <g id="text_4">
    <text style="font: 700 7.2px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="74.8512" y="293.07825" transform="rotate(-0 74.8512 293.07825)">Clinical decision support</text>
   </g>
   <g id="text_5">
    <text style="fill: #ffffff; font: 700 6.5px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="245.5992" y="292.852922" transform="rotate(-0 245.5992 292.852922)">Not supported</text>
   </g>
   <g id="text_6">
    <text style="fill: #374151; font: 6.4px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="307.872" y="292.824" transform="rotate(-0 307.872 292.824)">Current evidence cannot guide treatment.</text>
   </g>
   <g id="text_7">
    <text style="font: 700 7.2px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="74.8512" y="249.211125" transform="rotate(-0 74.8512 249.211125)">Prognostic assessment</text>
   </g>
   <g id="text_8">
    <text style="fill: #272727; font: 700 6.5px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="245.5992" y="249.034266" transform="rotate(-0 245.5992 249.034266)">Exploratory only</text>
   </g>
   <g id="text_9">
    <text style="fill: #374151; font: 6.4px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="307.872" y="249.009" transform="rotate(-0 307.872 249.009)">No mortality association is interpreted as prognostic validation.</text>
   </g>
   <g id="text_10">
    <text style="font: 700 7.2px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="74.8512" y="205.435125" transform="rotate(-0 74.8512 205.435125)">Treatment-response monitoring</text>
   </g>
   <g id="text_11">
    <text style="fill: #272727; font: 700 6.5px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="245.5992" y="205.300922" transform="rotate(-0 245.5992 205.300922)">Limited E2 anchor</text>
   </g>
   <g id="text_12">
    <text style="fill: #374151; font: 6.4px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="307.872" y="205.272" transform="rotate(-0 307.872 205.272)">Do not use pathway coupling as proof of treatment responsiveness.</text>
   </g>
   <g id="text_13">
    <text style="font: 700 7.2px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="74.8512" y="161.669812" transform="rotate(-0 74.8512 161.669812)">Repeat testing at 48 h</text>
   </g>
   <g id="text_14">
    <text style="fill: #272727; font: 700 6.5px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="245.5992" y="161.564531" transform="rotate(-0 245.5992 161.564531)">Supported with caution</text>
   </g>
   <g id="text_15">
    <text style="fill: #374151; font: 6.4px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="307.872" y="161.4665" transform="rotate(-0 307.872 161.4665)">T48 evidence is more vulnerable to dropout and recovery-state selection.</text>
   </g>
   <g id="text_16">
    <text style="font: 700 7.2px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="74.8512" y="117.893812" transform="rotate(-0 74.8512 117.893812)">Repeat testing at 24 h</text>
   </g>
   <g id="text_17">
    <text style="fill: #272727; font: 700 6.5px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="245.5992" y="117.745875" transform="rotate(-0 245.5992 117.745875)">Supported: score change</text>
   </g>
   <g id="text_18">
    <text style="fill: #374151; font: 6.4px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="307.872" y="117.72" transform="rotate(-0 307.872 117.72)">Sampling time must be stated with every score.</text>
   </g>
   <g id="text_19">
    <text style="font: 700 7.2px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="74.8512" y="74.107125" transform="rotate(-0 74.8512 74.107125)">Baseline adjunctive diagnosis</text>
   </g>
   <g id="text_20">
    <text style="fill: #272727; font: 700 6.5px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="245.5992" y="73.972922" transform="rotate(-0 245.5992 73.972922)">Indirect</text>
   </g>
   <g id="text_21">
    <text style="fill: #374151; font: 6.4px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="307.872" y="73.944" transform="rotate(-0 307.872 73.944)">Do not describe as newly validated baseline diagnostic performance.</text>
   </g>
  </g>
  <g id="text_22">
   <text style="font: 700 10px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="64.224" y="14.479687" transform="rotate(-0 64.224 14.479687)">Context of use for repeated host-response RNA scores</text>
  </g>
  <g id="text_23">
   <text style="fill: #555555; font: 6.5px 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="7.2" y="337.248" transform="rotate(-0 7.2 337.248)">The current study supports temporal description, not assay thresholds, prognostic validation or treatment decisions.</text>
  </g>
 </g>
